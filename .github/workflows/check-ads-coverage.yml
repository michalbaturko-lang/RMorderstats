name: Check Ads Coverage

on:
  workflow_dispatch:
    inputs:
      providers:
        description: 'Providers: google_ads,meta_ads'
        required: false
        default: 'google_ads,meta_ads'
      markets:
        description: 'Markets, for example cz or cz,sk,hu,ro'
        required: false
        default: ''
      from_date:
        description: 'Coverage start date YYYY-MM-DD'
        required: true
        default: '2026-01-01'
      to_date:
        description: 'Coverage end date YYYY-MM-DD'
        required: true
        default: '2026-05-19'
      require_data:
        description: 'Fail if no Ads rows exist for the selected filter'
        required: false
        default: '1'

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run verify:ads-readonly

      - name: Check Supabase Ads coverage
        run: npm run check:ads-coverage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FX_RATES_JSON: ${{ vars.FX_RATES_JSON || '{"CZK":1,"EUR":25.2,"HUF":0.063,"RON":5.1}' }}
          ADS_COVERAGE_PROVIDERS: ${{ github.event.inputs.providers || 'google_ads,meta_ads' }}
          SYNC_MARKETS: ${{ github.event.inputs.markets || '' }}
          SYNC_FROM_DATE: ${{ github.event.inputs.from_date }}
          SYNC_TO_DATE: ${{ github.event.inputs.to_date }}
          ADS_COVERAGE_REQUIRE_DATA: ${{ github.event.inputs.require_data || '1' }}
