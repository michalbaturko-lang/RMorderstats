name: Sync Ads Spend

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      providers:
        description: 'Providers: google_ads,meta_ads'
        required: false
        default: 'google_ads,meta_ads'
      markets:
        description: 'Markets, for example cz or cz,sk,hu,ro'
        required: false
        default: ''
      days_back:
        description: 'Rolling window for spend refresh'
        required: false
        default: '1'
      from_date:
        description: 'Optional campaign-only spend backfill start date YYYY-MM-DD'
        required: false
        default: ''
      to_date:
        description: 'Optional campaign-only spend backfill end date YYYY-MM-DD'
        required: false
        default: ''

concurrency:
  group: ads-spend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run verify:ads-readonly

      - name: Sync current ads spend
        run: npm run sync:ads-analytics
        env:
          ADS_SYNC_PROVIDERS: ${{ github.event.inputs.providers || vars.ADS_SPEND_PROVIDERS || 'google_ads,meta_ads' }}
          ADS_SYNC_SKIP_MISSING_SECRETS: '1'
          SYNC_MARKETS: ${{ github.event.inputs.markets || vars.SYNC_MARKETS || '' }}
          SYNC_FROM_DATE: ${{ github.event.inputs.from_date || '' }}
          SYNC_TO_DATE: ${{ github.event.inputs.to_date || '' }}
          SYNC_DAYS_BACK: ${{ github.event.inputs.days_back || vars.ADS_SPEND_DAYS_BACK || '1' }}
          FX_RATES_JSON: ${{ vars.FX_RATES_JSON || '{"CZK":1,"EUR":25.2,"HUF":0.063,"RON":5.1}' }}

          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_BASE44_APP_ID: ${{ secrets.GOOGLE_ADS_BASE44_APP_ID }}
          GOOGLE_ADS_BASE44_ACCESS_TOKEN: ${{ secrets.GOOGLE_ADS_BASE44_ACCESS_TOKEN }}
          GOOGLE_ADS_BASE44_TOKEN_ACCOUNT_ID: ${{ secrets.GOOGLE_ADS_BASE44_TOKEN_ACCOUNT_ID }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          GOOGLE_ADS_ACCOUNTS_JSON: ${{ secrets.GOOGLE_ADS_ACCOUNTS_JSON }}
          GOOGLE_ADS_API_VERSION: ${{ vars.GOOGLE_ADS_API_VERSION || 'v23' }}
          GOOGLE_ADS_DETAIL_LEVELS: campaign

          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_ADS_ACCOUNTS_JSON: ${{ secrets.META_ADS_ACCOUNTS_JSON }}
          META_GRAPH_API_VERSION: ${{ vars.META_GRAPH_API_VERSION || 'v24.0' }}
          META_ADS_DETAIL_LEVELS: campaign
