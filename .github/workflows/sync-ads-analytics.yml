name: Sync Ads Analytics

on:
  schedule:
    - cron: '17 */4 * * *'
  workflow_dispatch:
    inputs:
      providers:
        description: 'Providers: google_ads,meta_ads'
        required: false
        default: 'google_ads,meta_ads'
      markets:
        description: 'Markets, for example cz or cz,sk,hu,ro'
        required: false
        default: ''
      from_date:
        description: 'Backfill start date YYYY-MM-DD'
        required: false
        default: ''
      to_date:
        description: 'Backfill end date YYYY-MM-DD'
        required: false
        default: ''
      days_back:
        description: 'Rolling window when from/to is empty'
        required: false
        default: '14'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Sync marketing ads analytics
        run: npm run sync:ads-analytics
        env:
          ADS_SYNC_PROVIDERS: ${{ github.event.inputs.providers || vars.ADS_SYNC_PROVIDERS || 'google_ads,meta_ads' }}
          ADS_SYNC_SKIP_MISSING_SECRETS: '1'
          SYNC_MARKETS: ${{ github.event.inputs.markets || vars.SYNC_MARKETS || '' }}
          SYNC_FROM_DATE: ${{ github.event.inputs.from_date || '' }}
          SYNC_TO_DATE: ${{ github.event.inputs.to_date || '' }}
          SYNC_DAYS_BACK: ${{ github.event.inputs.days_back || vars.SYNC_DAYS_BACK || '14' }}
          FX_RATES_JSON: ${{ vars.FX_RATES_JSON || '{"CZK":1,"EUR":25.2,"HUF":0.063,"RON":5.1}' }}

          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          GOOGLE_ADS_ACCOUNTS_JSON: ${{ secrets.GOOGLE_ADS_ACCOUNTS_JSON }}
          GOOGLE_ADS_API_VERSION: ${{ vars.GOOGLE_ADS_API_VERSION || 'v23' }}
          GOOGLE_ADS_DETAIL_LEVELS: ${{ vars.GOOGLE_ADS_DETAIL_LEVELS || 'campaign,device,search_term,shopping_product,asset_group' }}

          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_ADS_ACCOUNTS_JSON: ${{ secrets.META_ADS_ACCOUNTS_JSON }}
          META_GRAPH_API_VERSION: ${{ vars.META_GRAPH_API_VERSION || 'v24.0' }}
          META_ADS_DETAIL_LEVELS: ${{ vars.META_ADS_DETAIL_LEVELS || 'campaign,adset,ad,audience,geo,placement' }}
